version: 2

# 改用 modernc.org/sqlite (纯 Go) 后,所有构建均无需 CGO,也不再需要 C 交叉编译工具链
# 与 sqlite_* build tags。每个 build 显式钉 CGO_ENABLED=0,防止 native build (linux/amd64)
# 在 runner 自带 gcc 时默认走 CGO=1 导致动态链接 glibc。

builds:
  # ==================== Linux 构建 ====================

  # Linux AMD64 (x86_64) - 最常用的服务器架构
  - id: linux-amd64
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: nodepassdash
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.Version={{ .Version }}

  # Linux ARM64 (aarch64) - 新款ARM服务器、树莓派4 64位
  - id: linux-arm64
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: nodepassdash
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.Version={{ .Version }}

  # Linux ARMv7 (hard-float) - 树莓派2/3/4 32位、大多数ARM设备
  - id: linux-armv7
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: nodepassdash
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - 7
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.Version={{ .Version }}

  # Linux ARMv6 (soft-float) - 树莓派1、老款ARM设备
  - id: linux-armv6
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: nodepassdash
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - 6
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.Version={{ .Version }}

  # ==================== Windows 构建 ====================

  # Windows AMD64 - 主流Windows系统
  - id: windows-amd64
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: nodepassdash
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.Version={{ .Version }}

  # Windows 386 - 32位Windows系统
  - id: windows-386
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: nodepassdash
    goos:
      - windows
    goarch:
      - 386
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X main.Version={{ .Version }}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm" }}armv{{ .Arm }}
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}hf{{ end }}
    # 包含额外文件到压缩包
    files:
      - README.md
      - LICENSE
    # 确保二进制文件在根目录，其他文件保持相对路径
    wrap_in_directory: false

release:
  # 自动检测预发布版本 (包含 alpha, beta, rc 等)
  prerelease: auto
  # 发布名称模板
  name_template: "NodePassDash {{ .Version }}"
  # 允许替换已存在的发布
  replace_existing_draft: true
  # 发布说明
  header: |
    ## NodePassDash Release Notes (v4.0.6)
    
    ### Fix
    - repair hourly traffic statistics across SQLite and PostgreSQL

    ### Feature
    - endpoint page add update config menu 

  footer: |

    ### 📥 Download Desc
    - **Linux x86_64**: `nodepassdash_Linux_x86_64.tar.gz`
    - **Linux ARM64**: `nodepassdash_Linux_arm64.tar.gz`
    - **Linux ARMv7**: `nodepassdash_Linux_armv7hf.tar.gz`
    - **Linux ARMv6**: `nodepassdash_Linux_armv6.tar.gz`
    - **Windows 64位**: `nodepassdash_Windows_x86_64.zip`
    - **Windows 32位**: `nodepassdash_Windows_i386.zip`

    ### 🐳 Docker Image
    ```bash
    docker pull ghcr.io/nodepassproject/nodepassdash:{{ .Version }}
    ```

    ### 🔧 Usage
    1. Download the binary package for your target architecture.
    2. Extract the archive and run `./nodepassdash` directly. No external runtime is required.
    3. The service listens on `http://localhost:3000` by default.

    ### 📝 Deployment Notes
    - **Single-binary deployment**: Run the application with a single executable file.
    - **Automatic initialization**: The application creates required files and directories automatically.
    - **Data persistence**: The database file is stored at `db/database.db`
